<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - The Explainer</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <h1>The Explainer</h1>
  <nav>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="../explainers.html">Explainers</a></li>
      <li><a href="../technology.html">Technology</a></li>
      <li><a href="../society.html">Society</a></li>
      <li><a href="../economy.html">Economy</a></li>
    </ul>
  </nav>
</header>

<main class="container article-container">
  <article>
    <h1>Contact Us</h1>
    <p><em>We’d love to hear from you! Fill out the form below.</em></p>

    <form id="contactForm" action="https://formspree.io/f/xojkwzer" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <br><br>
      <button type="submit">Send Message</button>
    </form>
  </article>
</main>

<script>
  const form = document.getElementById('contactForm');

  form.addEventListener('submit', function(event) {
    event.preventDefault(); // prevent page reload

    fetch(form.action, {
      method: form.method,
      body: new FormData(form),
      headers: {
        'Accept': 'application/json'
      }
    })
    .then(response => {
      if (response.ok) {
        alert('Thank You! Your message has been sent.');
        form.reset(); // clear the form
      } else {
        alert('Oops! There was a problem submitting your form.');
      }
    })
    .catch(error => {
      alert('Oops! There was a problem submitting your form.');
    });
  });
</script>

<footer>

</footer>

</body>
</html>
