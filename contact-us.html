<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - The Explainer</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Container and article styling */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    h1 {
      color: #FF0000;
      margin-bottom: 20px;
      text-align: center;
    }
    p {
      line-height: 1.7;
    }

    /* Form styling */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }
    label {
      font-weight: bold;
      color: #333;
    }
    input, textarea {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
      transition: 0.3s;
    }
    input:focus, textarea:focus {
      border-color: #FF0000;
      outline: none;
      box-shadow: 0 0 5px rgba(255,0,0,0.3);
    }
    button {
      background-color: #FF0000;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #cc0000;
    }

    /* Modal overlay */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
      animation: fadeIn 0.5s ease;
    }
    .modal-content h2 {
      margin-bottom: 15px;
      color: #FF0000;
    }
    .close-btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #FF0000;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .close-btn:hover {
      background-color: #cc0000;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }
  </style>
</head>
<body>

<header>
  <h1>The Explainer</h1>
  <nav>
    <ul>
      <li><a href="https://www.theexplainer.co.ke/">Home</a></li>
      <li><a href="../explainers.html">Explainers</a></li>
      <li><a href="../technology.html">Technology</a></li>
      <li><a href="../society.html">Society</a></li>
      <li><a href="../economy.html">Economy</a></li>
    </ul>
  </nav>
</header>

<main class="container">
  <article>
    <h1>Contact Us</h1>
    <p><em>We’d love to hear from you! Fill out the form below.</em></p>

    <form id="contactForm" action="https://formspree.io/f/xojkwzer" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </article>
</main>

<!-- Modal -->
<div class="modal" id="thankYouModal">
  <div class="modal-content">
    <h2>Thank You!</h2>
    <p>Your message has been sent successfully. We will get back to you soon.</p>
    <button class="close-btn" id="closeModal">Close</button>
  </div>
</div>

<script>
  const form = document.getElementById('contactForm');
  const modal = document.getElementById('thankYouModal');
  const closeBtn = document.getElementById('closeModal');

  form.addEventListener('submit', function(event) {
    event.preventDefault();

    fetch(form.action, {
      method: form.method,
      body: new FormData(form),
      headers: {
        'Accept': 'application/json'
      }
    })
    .then(response => {
      if (response.ok) {
        modal.style.display = 'flex';
        form.reset();
      } else {
        alert('Oops! There was a problem submitting your form.');
      }
    })
    .catch(error => {
      alert('Oops! There was a problem submitting your form.');
    });
  });

  closeBtn.addEventListener('click', () => {
    modal.style.display = 'none';
  });

  // Close modal when clicking outside
  window.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });
</script>

<footer>
  <ul>
<li><a href="about.html">About Us</a></li>
<li><a href="contact-us.html">Contact Us</a></li>
<li><a href="policy.html">Privacy Policy</a></li>
  </ul>
  <p>© 2026 The Explainer</p>
</footer>

</body>
</html>
